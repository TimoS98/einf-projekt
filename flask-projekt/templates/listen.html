<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='list.css') }}">
    <title>Dashboard</title>
</head>

<body>
    <div id="navbar">
        <img src="{{ url_for('static', filename='shopping_cart.png') }}" id="shoping_cart" />
        <div id="logout">⏻</div>
    </div>
    <div id="add_person_to_list">
        <img src="{{ url_for('static', filename='user.png') }}" id="add_user" />
    </div>
    <div id="add_one">+</div>




    </div>
    </div>
    <script>
        var input_fields = [];
        var background_div;
        var select_box;
        var select_set;
        var close_b;
        var create_field;
        var creator;
        let counter = 0;
        var backward;
        var list_elem;
        var error;
        // öffnen des Menü zum Hinzufügen von Listen
        document.getElementById("add_one").addEventListener("click", add);
        
        // Listenanordnung berechnen beim verkleinern des Browserfensters
        window.addEventListener("resize", function () {
            repositionLists();
        });
        // Homemenü Listen hinzufügen 
        function add() {
            background_div = document.createElement("div");
            background_div.classList.add("background_add");
            document.body.appendChild(background_div);
            select_box = document.createElement("div");
            select_box.classList.add("select_box");
            background_div.appendChild(select_box);
            close_b = document.createElement("div");
            close_b.classList.add("close_b");
            close_b.textContent = "✕";
            select_box.appendChild(close_b);
            close_b.addEventListener("click", close_all);
            select_set = document.createElement("div");
            select_set.classList.add("select_set");
            select_box.appendChild(select_set);


            const choice_one = document.createElement("div");
            choice_one.classList.add("choice");
            choice_one.textContent = "Liste mit ListenID hinzufügen"
            select_set.appendChild(choice_one);

            const choice_two = document.createElement("div");
            choice_two.classList.add("choice");
            choice_two.textContent = "Liste neu erstellen";
            select_set.appendChild(choice_two);

            choice_one.addEventListener("click", listID);

            choice_two.addEventListener("click", function () {
                newList();
            });
        }
        // Menü Liste per ID importieren 
        function listID() {
            select_set.innerHTML = "";
            const list_id = document.createElement("input");
            list_id.classList.add("list_id");
            select_set.appendChild(list_id);
            list_id.placeholder = "ListenID";
            submit_b = document.createElement("div");
            submit_b.classList.add("button_sub");
            select_set.appendChild(submit_b);
            submit_b.innerHTML = "bestätigen"
            submit_b.addEventListener("click", () => {
                if (list_id.value != "") {
                    add_liste_with_id(list_id.value)
                }
                else {
                    const warning = document.createElement("div");
                    warning.innerHTML = "Bitte geben Sie eine ListenId an";
                    warning.classList.add("warning");
                    select_set.appendChild(warning);
                }
            });
            const back = document.createElement("div");
            back.classList.add("back_arrow");
            select_set.appendChild(back);
            back.innerHTML = "←"
            back.addEventListener("click", goback);

        }
        // Aus dem ListenID Menü zurück ins Home Menü 
        function goback() {
            select_set.innerHTML = "";
            background_div.remove();
            add();
        }
        // öffnen des menü zum manuellen Listen erstellen 
        function newList() {
            select_set.innerHTML = "";
            const new_elem = document.createElement("div");
            new_elem.dataset.id = input_fields.length;

            new_elem.classList.add("new_elem");
            new_elem.addEventListener("click", () => {
                add_next()
            });
            new_elem.dataset.id = counter;
            select_set.appendChild(new_elem);
            const innercycle = document.createElement("div");
            innercycle.classList.add("inner_cycle");
            innercycle.textContent = "+";
            new_elem.appendChild(innercycle);

            backward = document.createElement("div");
            backward.classList.add("home");
            backward.addEventListener("click", () => {
                home()
            });
            select_box.appendChild(backward);
            backward.textContent = "←"

            const forward = document.createElement("div");
            forward.classList.add("forward");
            forward.addEventListener("click", insertListname);
            select_box.appendChild(forward);
            forward.textContent = "✓";







        }
       // Schließen des Menüs 
        function close_all() {
            if (background_div) {
                background_div.remove();
                background_div = null;
                select_box = null;
                select_set = null;
            }
        }
        // Funktion zum hinzufügen eines weiteren Elementes
        function add_next() {

            create_field = document.createElement("div");
            create_field.classList.add("create_field");
            select_box.appendChild(create_field);
            creator = document.createElement("div");

            creator.classList.add("creator");
            create_field.appendChild(creator);
            const close_creator = document.createElement("div");
            close_creator.classList.add("close_cr");
            close_creator.textContent = "✕";
            creator.appendChild(close_creator);
            close_creator.addEventListener("click", cl_creator);
            const name = document.createElement("input");
            name.placeholder = "Was möchten Sie erledigen?";
            name.classList.add("titel");
            creator.appendChild(name);
            const tick = document.createElement("div")
            tick.textContent = "✓";
            tick.classList.add("tick");
            creator.appendChild(tick);

            const select = document.createElement("select");
            select.classList.add("priority_select");

            const default_select = document.createElement("option");
            default_select.value = "default_select";
            default_select.textContent = "Welche Priorität?";


            const option1 = document.createElement("option");
            option1.value = "low";
            option1.textContent = "Niedrig";

            const option2 = document.createElement("option");
            option2.value = "medium";
            option2.textContent = "Mittel";

            const option3 = document.createElement("option");
            option3.value = "high";
            option3.textContent = "Hoch";

            select.appendChild(default_select);
            select.appendChild(option1);
            select.appendChild(option2);
            select.appendChild(option3);

            select_set.appendChild(select);
            creator.appendChild(select)
            tick.addEventListener("click", function () {
                finish(name.value, select.value);
            });

        }
        // schließen des Creators
        function cl_creator() {
            create_field.remove();
        }
        // schließt das Element erstellen Menü und fügt ein neues Element zur erstellenden Liste hinzu 
        function finish(value_ToDo, value_select) {
            const todo = {
                id: counter,
                title: value_ToDo,
                priority: value_select
            };
            const trash = document.createElement("div");
            trash.classList.add("trash")
            trash.textContent = "❌"
            trash.dataset.id = counter;
            trash.addEventListener("click", discard);


            creator.remove();

            create_field.remove();
            const edit = document.createElement("div");
            edit.classList.add("bearbeiten")
            edit.textContent = "🔨"
            edit.dataset.id = counter;
            edit.addEventListener("click", edit_f)




            input_fields.push(todo);
            const element = select_set.querySelector(`[data-id="${counter}"]`);
            element.innerHTML = "";
            element.classList.remove("new_elem");
            element.classList.add("finish_obj");
            element.appendChild(trash);
            element.appendChild(edit)
            element.removeEventListener("click", add_next);

            const box_entry = document.createElement("div");
            const box_priority = document.createElement("div");
            box_entry.textContent = "Aufgabe: " + todo.title;
            box_priority.textContent = "Priorität: " + todo.priority;
            box_entry.classList.add("boxentry")
            box_priority.classList.add("priority_box")
            element.appendChild(box_entry);
            element.appendChild(box_priority)
            counter++;



            element.classList.add("finish_obj");
            const new_elem = document.createElement("div");
            new_elem.classList.add("new_elem");
            new_elem.addEventListener("click", add_next);
            new_elem.dataset.id = counter;

            select_set.appendChild(new_elem);
            const innercycle = document.createElement("div");
            innercycle.classList.add("inner_cycle");
            innercycle.textContent = "+";
            new_elem.appendChild(innercycle);

        }
        // Klickevent: Abfeuern des Events element aus erstellender Liste löschen
        function discard(e) {
            e.stopPropagation();
            const element = this.closest("[data-id]");

            const id = element.dataset.id;
            const parent = element.parentElement;

            parent.remove();

            for (let i = 0; i < input_fields.length; i++) {
                if (input_fields[i].id == id) {
                    input_fields.splice(i, 1);
                    break;
                }
            }




        }
        // Klickevent: Abfeuern des Events element aus erstellender Liste bearbeiten

        function edit_f(e) {

            e.stopPropagation();
            const button = e.currentTarget;
            const parent = button.parentElement;

            const id = parent.dataset.id;



            let priority;
            let titel;

            for (let i = 0; i < input_fields.length; i++) {
                if (input_fields[i].id == id) {
                    priority = input_fields[i].priority;
                    titel = input_fields[i].title;
                    break;
                }
            }

            create_field = document.createElement("div");
            create_field.classList.add("create_field");
            select_box.appendChild(create_field);

            creator = document.createElement("div");
            creator.classList.add("creator");
            create_field.appendChild(creator);

            const close_creator = document.createElement("div");
            close_creator.classList.add("close_cr");
            close_creator.textContent = "✕";
            creator.appendChild(close_creator);
            close_creator.addEventListener("click", cl_creator);

            const name = document.createElement("input");
            name.placeholder = "Was möchten Sie erledigen?";
            name.classList.add("titel");
            name.value = titel;
            creator.appendChild(name);

            const tick = document.createElement("div");
            tick.textContent = "✓";
            tick.classList.add("tick");
            creator.appendChild(tick);

            const select = document.createElement("select");
            select.classList.add("priority_select");

            const option1 = new Option("Niedrig", "niedrig");
            const option2 = new Option("Mittel", "mittel");
            const option3 = new Option("Hoch", "hoch");

            select.append(option1, option2, option3);
            select.value = priority;

            creator.appendChild(select);

            tick.addEventListener("click", function () {
                change(id, name.value, select.value);
            });
        }
        // Inhalte des bearbeitenden Elements
        function change(id, input_value, select_value) {

            let obj = select_box.querySelector(`[data-id="${id}"]`)

            for (let i = 0; i < input_fields.length; i++) {
                if (input_fields[i].id == id) {
                    input_fields[i].priority = select_value;
                    input_fields[i].title = input_value;
                    break;
                }
            }


            const trash = document.createElement("div");
            trash.classList.add("trash")
            trash.textContent = "❌"
            trash.dataset.id = id;
            trash.addEventListener("click", discard);

            const edit = document.createElement("div");
            edit.classList.add("bearbeiten")
            edit.textContent = "🔨"
            edit.dataset.id = id;
            edit.addEventListener("click", edit_f)

            create_field.remove();
            const element = document.querySelector(`[data-id="${id}"]`);
            element.innerHTML = "";
            const box_entry = document.createElement("div");
            const box_priority = document.createElement("div");



            box_entry.textContent = "Aufgabe: " + input_value;
            box_priority.textContent = "Priorität: " + select_value;
            box_entry.classList.add("boxentry")
            box_priority.classList.add("priority_box")
            obj.innerHTML = "";
            obj.appendChild(box_entry);
            obj.appendChild(box_priority)
            obj.appendChild(trash);
            obj.appendChild(edit);




        }
        // schließen des Hauptmenüs
        function home() {
            input_fields = [];
            background_div.remove();
            background_div = null;
            select_box = null;
            select_set = null;
            add();

        }
        // erstellen einer neuen Liste 
        function insertListname() {

            create_field = document.createElement("div");
            create_field.classList.add("create_field");
            select_box.appendChild(create_field);
            creator = document.createElement("div");
            creator.classList.remove("creator");
            creator.classList.add("creator_listname");
            create_field.appendChild(creator);
            const close_creator = document.createElement("div");
            close_creator.classList.add("close_cr");
            close_creator.textContent = "✕";
            creator.appendChild(close_creator);
            close_creator.addEventListener("click", cl_creator);
            const name = document.createElement("input");
            name.placeholder = "Titel der Liste";
            name.classList.add("list_name");
            creator.appendChild(name);
            const test_tick = document.createElement("div")
            test_tick.textContent = "✓";
            test_tick.classList.add("tick");
            creator.appendChild(test_tick);
            test_tick.addEventListener("click", function () {
                if (name.value != "") {
                    background_div.remove();
                    saveList(name.value);
                } else {
                    empty = document.createElement("div");
                    empty.classList.add("empty")
                    creator.appendChild(empty);
                    empty.textContent = "Bitte geben Sie einen Titel ein";
                }
            });
        }
        // speichern einer Liste durch betätigen des Tick buttons 
        function saveList(listname) {

            const payload = {
                listname: listname,
                todos: input_fields
            };
            fetch("/save_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            }).then(response => {

                return response.json();
            })
                .then(data => {
                    input_fields = [];

                    list_elem = document.createElement("div");
                    list_elem.classList.add("list_elem");
                    list_elem.dataset.id = data["listID"];
                    list_elem.addEventListener("click", openlist);
                    document.body.appendChild(list_elem);
                    const informations_box = document.createElement("div");
                    informations_box.classList.add("information_box");
                    list_elem.appendChild(informations_box);
                    const information = document.createElement("div");
                    information.classList.add("information");
                    informations_box.appendChild(information);
                    information.textContent = "#" + data["listID"];
                    const listenname = document.createElement("div");
                    listenname.classList.add("listen_name");
                    informations_box.appendChild(listenname);
                    listenname.textContent = data["listenname"];

                    const edit_current_list = document.createElement("div");
                    edit_current_list.textContent = "🔨";
                    edit_current_list.dataset.id = data["listID"];
                    edit_current_list.classList.add("edit_list")
                    edit_current_list.addEventListener("click", edit_but);
                    list_elem.appendChild(edit_current_list);


                    const delete_list = document.createElement("div");
                    delete_list.textContent = "🗑️";
                    delete_list.dataset.id = data["ListenID"];
                    delete_list.classList.add("delete_list");
                    delete_list.addEventListener("click", deletelist);
                    list_elem.appendChild(delete_list);



                    repositionLists();
                })
                .catch(error => {
                    console.error("Fehler", error);
                })
        }
        // Berechnung Anordnung der Listenanordnung 
        function repositionLists() {

            let elements = document.querySelectorAll(".list_elem");
            let space_per_row = Math.floor(1 / 0.17);
            elements.forEach((element, index) => {
                let col = index % space_per_row;
                let row = Math.floor(index / space_per_row);

                element.style.left = (2 + col * 17) + "%";
                element.style.top = (15 + row * 27) + "vh";
            });
        }

        // Große Listenansicht öffnen 
        function openlist() {
            fetch("/open_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ listenid: this.dataset.id })
            }).then(response => {
                return response.json();
            })
                .then(data => {

                    history.pushState({ offeneliste: "Super" }, "", "/dashboard");
                    window.location.href = "/open_list_page";
                })
                .catch(error => {
                    console.error("Fehler", error);
                })
        }
        document.addEventListener("DOMContentLoaded", function () {
            listenladen();
        });

        // Laden der Listen nach Login oder refresh der Seite 
        function listenladen() {
            fetch("/listen.html", {
                method: "GET",

            }).then(response => {

                return response.json();
            })
                .then(data => {

                    for (let i = 0; i < data.length; i++) {
                        list_elem = document.createElement("div");
                        list_elem.classList.add("list_elem");
                        list_elem.dataset.id = data[i]["ListenID"];
                        list_elem.addEventListener("click", openlist);
                        document.body.appendChild(list_elem);
                        const informations_box = document.createElement("div");
                        informations_box.classList.add("information_box");
                        list_elem.appendChild(informations_box);
                        const delete_list = document.createElement("div");
                        delete_list.textContent = "🗑️";
                        delete_list.dataset.id = data[i]["ListenID"];
                        delete_list.classList.add("delete_list");
                        delete_list.addEventListener("click", deletelist);

                        const edit_current_list = document.createElement("div");
                        edit_current_list.classList.add("edit_list")
                        edit_current_list.dataset.id = data[0]["ListenID"];
                        edit_current_list.textContent = "🔨";
                        edit_current_list.addEventListener("click", edit_but);
                        list_elem.appendChild(edit_current_list);
                        list_elem.appendChild(delete_list);
                        const information = document.createElement("div");
                        information.classList.add("information");
                        informations_box.appendChild(information);
                        information.textContent = "#" + data[i]["ListenID"];
                        const listenname = document.createElement("div");
                        listenname.classList.add("listen_name");
                        informations_box.appendChild(listenname);
                        listenname.textContent = data[i]["Listenname"];



                        repositionLists();
                    }
                })
                .catch(error => {
                    console.error("Fehler", error);
                })
        }

        document.getElementById("logout").addEventListener("click", () => {
            fetch("/logout", {
                method: "GET",
            }).then(response => {
                history.pushState({ offeneliste: "Super" }, "", "/dashboard");

                return;
            }).then(data => {

                window.location.href = "/";
            }).catch(error => {
                console.error("Fehler", error);
            })
        });
        // Hinzufügen einer Liste per ID (import)
        function add_liste_with_id(listenid) {

            fetch("/add_list_with_id", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ listenid: listenid })
            }).then(response => {
                return response.json();
            })
                .then(data => {
                    if (data.error == null) {
                        background_div.remove();
                        load_list(data[0]["ListenID"]);
                    } else {
                        alert("Sie haben die Liste bereits");
                    }


                })
                .catch(error => {
                    console.error("Fehler", error);
                })
        }
        // laden einer einzelnen Liste nach dem erstellen 
        function load_list(listenid) {
            fetch("/load_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ listenid: listenid })
            }).then(response => {

                return response.json();
            }).then(data => {

                var listID = data[0]["ListenID"];
                var listen_name = data[0]["Listenname"];
                list_elem = document.createElement("div");
                list_elem.classList.add("list_elem");
                list_elem.dataset.id = listID
                list_elem.addEventListener("click", openlist);
                document.body.appendChild(list_elem);

                const edit_current_list = document.createElement("div");
                edit_current_list.classList.add("edit_list")
                edit_current_list.dataset.id = data[0]["ListenID"];
                edit_current_list.textContent = "🔨";
                edit_current_list.addEventListener("click", edit_but);
                list_elem.appendChild(edit_current_list);



                const delete_list = document.createElement("div");
                delete_list.textContent = "🗑️";
                delete_list.dataset.id = data[0]["ListenID"];
                delete_list.classList.add("delete_list");
                delete_list.addEventListener("click", deletelist);
                list_elem.appendChild(delete_list);


                const informations_box = document.createElement("div");
                informations_box.classList.add("information_box");
                list_elem.appendChild(informations_box);
                const information = document.createElement("div");
                information.classList.add("information");
                informations_box.appendChild(information);
                information.textContent = "#" + listID;
                const listenname = document.createElement("div");
                listenname.classList.add("listen_name");
                informations_box.appendChild(listenname);
                listenname.textContent = listen_name;
                repositionLists();
            })
        }

        document.getElementById("add_person_to_list").addEventListener("click", () => {
            background_div = document.createElement("div");
            background_div.classList.add("background_add");
            document.body.appendChild(background_div);
            select_box = document.createElement("div");
            select_box.classList.add("select_box");

            background_div.appendChild(select_box);
            close_b = document.createElement("div");
            close_b.classList.add("close_b");
            close_b.textContent = "✕";
            select_box.appendChild(close_b);
            close_b.addEventListener("click", close_all);
            select_set = document.createElement("div");
            select_set.classList.add("select_set");
            select_box.appendChild(select_set);


            const list_id = document.createElement("input");
            list_id.classList.add("input_listID");
            list_id.placeholder = "Bitte geben Sie die ListenID ein"
            select_set.appendChild(list_id);

            const email_user = document.createElement("input");
            email_user.classList.add("email_user");
            email_user.placeholder = "Bitte tragen Sie die E-Mail Adresse des Users ein";
            select_set.appendChild(email_user);

            const submit = document.createElement("div");
            submit.classList.add("submit")
            submit.textContent = "✓";
            select_set.appendChild(submit);
            submit.addEventListener("click", () => {
                if (email_user.value != "" && list_id.value != "") {
                    fetch("/add_user", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email: email_user.value, listenid: list_id.value })
                    }).then(response => {

                        return response.json();
                    }).then(data => {
                        if (data.error == "Liste existiert nicht") {
                            if (document.querySelector(".error") != null) {
                                error.remove();
                            }
                            error = document.createElement("div");
                            error.innerHTML = "Bitte geben Sie eine gültige ListenID ein"
                            error.classList.add("error");
                            select_set.appendChild(error);

                        }
                        if (data.error == "User existiert nicht") {
                            if (document.querySelector(".error") != null) {
                                error.remove();
                            }
                            error = document.createElement("div");
                            error.innerHTML = "Bitte geben Sie einen anderen User an"
                            error.classList.add("error");
                            select_set.appendChild(error);
                        }
                        if (data.status == "ok") {
                            background_div.remove()
                        }
                    }).catch(error => {
                        console.error("Netzwerkfehler:", error);
                    })

                } else if (email_user.value == "") {
                    const miss_informationen = document.createElement("div");
                    miss_informationen.classList.add("miss_informationen");
                    miss_informationen.textContent = "Bitte geben Sie eine E-Mail Adresse ein";
                    select_set.appendChild(miss_informationen);

                } else {
                    const miss_informationen = document.createElement("div");
                    miss_informationen.classList.add("miss_informationen");
                    miss_informationen.textContent = "Bitte geben Sie eine ListenID ein";
                    select_set.appendChild(miss_informationen);
                }
            })


        });
        // Löschen einer Liste 
        function deletelist(e) {
            e.stopPropagation();
            const button = e.currentTarget;
            fetch("/delete_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ listenid: button.dataset.id })
            }).then(response => {
                return response.json();
            }).then(data => {
                if (data.error == null) {
                    button.parentElement.remove();
                    repositionLists();
                }
            }).catch(error => {

            })

        }
        // bearbeiten(abhaken von Einträgen) einer Liste 
        function edit_but(e) {
            e.stopPropagation();
            parent = e.currentTarget.parentElement
            id_list = parent.dataset.id
            fetch("/take_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ id: id_list })
            }).then(response => {
                return response.json();
            }).then(data => {
                data_todos = data["todos"];
                current_list_name = data["listenname"]
                
                todo = []
                for (let i = 0; i < data_todos.length; i++) {
                    const entry = { id: data_todos[i]["ID"], name: data_todos[i]["Name"], prio: data_todos[i]["Prioritaet"] };
                    todo.push(entry)
                }
               
                background_div = document.createElement("div");
                background_div.classList.add("background_add");
                document.body.appendChild(background_div);
                select_box = document.createElement("div");
                select_box.classList.add("select_box");
                background_div.appendChild(select_box);
                close_b = document.createElement("div");
                close_b.classList.add("close_b");
                close_b.textContent = "✕";
                select_box.appendChild(close_b);
                close_b.addEventListener("click", close_all);
                select_set = document.createElement("div");
                select_set.classList.add("select_set");
                select_box.appendChild(select_set);
                const forward = document.createElement("div");
                forward.classList.add("forward");
                forward.textContent = "✓";
                forward.addEventListener("click", () => {
                    edit_listname(todo, id_list,current_list_name)
                });
                select_box.appendChild(forward);
                for (let i = 0; i < todo.length; i++) {
                    const edit_elem = document.createElement("div");
                    edit_elem.classList.add("edit_elem");
                   
                    edit_elem.dataset.id = todo[i]["id"];
                    edit_elem.dataset.index = i;

                    const name = document.createElement("div");
                    name.classList.add("edit_prio");
                    name.textContent = "Aufgabe: " + todo[i]["name"]

                    const prio = document.createElement("div");
                    prio.classList.add("edit_prio");
                    prio.textContent = "Priorität: " + todo[i]["prio"]

                    const delete_edit_elem = document.createElement("div");
                    delete_edit_elem.classList.add("delete_edit_elem")
                    delete_edit_elem.textContent = "❌";
                    delete_edit_elem.dataset.id = todo[i]["id"];

                    const edit_edit_elem = document.createElement("div");
                    edit_edit_elem.classList.add("edit_edit_elem");
                    edit_edit_elem.textContent = "🔨";
                    edit_edit_elem.dataset.id = todo[i]["id"];
                    edit_edit_elem.dataset.index = i;

                    edit_elem.appendChild(prio)
                    edit_elem.appendChild(name)
                    edit_elem.appendChild(delete_edit_elem)
                    edit_elem.appendChild(edit_edit_elem)
                    select_set.appendChild(edit_elem)
                    delete_edit_elem.addEventListener("click", (e) => {
                        parent = e.target.parentElement;
                        id = e.target.dataset.id;
                        parent.remove();
                        for (let i = 0; i < todo.length; i++) {
                            if (todo[i]["id"] == id) {
                                todo.splice(i, 1);
                                
                                break;
                            }
                        }

                    });
                    edit_edit_elem.addEventListener("click", (e) => {

                        create_field = document.createElement("div");
                        create_field.classList.add("create_field");
                        select_box.appendChild(create_field);

                        creator = document.createElement("div");
                        creator.classList.add("creator");
                        create_field.appendChild(creator);

                        const close_creator = document.createElement("div");
                        close_creator.classList.add("close_cr");
                        close_creator.textContent = "✕";
                        creator.appendChild(close_creator);
                        close_creator.addEventListener("click", cl_creator);

                        const name = document.createElement("input");
                        name.placeholder = "Was möchten Sie erledigen?";
                        name.classList.add("titel");
                        name.value = todo[e.target.dataset.index]["name"];
                        creator.appendChild(name);

                        const tick = document.createElement("div");
                        tick.textContent = "✓";
                        tick.classList.add("tick");
                        creator.appendChild(tick);

                        const select = document.createElement("select");
                        select.classList.add("priority_select");

                        const option1 = new Option("Niedrig", "niedrig");
                        const option2 = new Option("Mittel", "mittel");
                        const option3 = new Option("Hoch", "hoch");

                        select.append(option1, option2, option3);
                        select.value = todo[e.target.dataset.index]["prio"];

                        creator.appendChild(select);


                        tick.addEventListener("click", function () {
                            create_field.remove()
                            obj = select_box.querySelector(`[data-id="${e.target.dataset.id}"]`)
                            obj.children[0].textContent = "Priorität: " + select.value;
                            obj.children[1].textContent = "Aufgabe: " + name.value;
                            for (let i = 0; i < todo.length; i++) {
                                if (todo[i]["id"] == obj.dataset.id) {
                                    todo[i]["prio"] = select.value;
                                    todo[i]["name"] = name.value;
                                    
                                    break;
                                }
                            }


                        });

                    });

                }

            })

        }
        // Ändern des Listennamens 
        function edit_listname(new_todo_list, id_list,current_list_name) {
            create_field = document.createElement("div");
            create_field.classList.add("create_field");
            select_box.appendChild(create_field);
            creator = document.createElement("div");
            creator.classList.remove("creator");
            creator.classList.add("creator_listname");
            create_field.appendChild(creator);
            const close_creator = document.createElement("div");
            close_creator.classList.add("close_cr");
            close_creator.textContent = "✕";
            creator.appendChild(close_creator);
            close_creator.addEventListener("click", cl_creator);
            const name = document.createElement("input");
            name.placeholder = "Titel der Liste";
            name.value = current_list_name; 
            name.classList.add("list_name");
            creator.appendChild(name);
            const test_tick = document.createElement("div")
            test_tick.textContent = "✓";
            test_tick.classList.add("tick");
            creator.appendChild(test_tick);
            test_tick.addEventListener("click", function () {
                if (name.value != "") {
                    background_div.remove();
                    save_modified_list(new_todo_list, id_list,name.value);
                } else {
                    empty = document.createElement("div");
                    empty.classList.add("empty")
                    creator.appendChild(empty);
                    empty.textContent = "Bitte geben Sie einen Titel ein";
                }
            });
        }
        // speichern der modifizierten Liste 
        function save_modified_list(new_todo_list, id_list,current_list_name) {
           
            payload = {
                listname : current_list_name,
                id_list: id_list,
                new_todo_list: new_todo_list

            }
            fetch("/save_modified_list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            }).then(response => {
                return response.json();
            }).then(data => {
                element = document.body.querySelector(`.list_elem[data-id="${id_list}"]`);
                list_information = element.children[0]
                list_name = list_information.children[1]
                list_name.textContent = data["listname"] 
            })
        }




    </script>
</body>

</html>
